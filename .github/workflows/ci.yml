name: CI

on:
  pull_request:
  push:
    branches: [main]

# Builds the Medusa monorepo (backend `medusa build` + storefront `next build`)
# the same way the deploys do, so type errors are caught on every PR. Dummy env
# values let the config load without real services; the build never connects to
# the database or any provider.
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medusa
    env:
      NPM_CONFIG_LEGACY_PEER_DEPS: "true"
      DATABASE_URL: postgres://user:pass@localhost:5432/medusa
      GOOGLE_GENERATIVE_AI_API_KEY: ci-dummy
      JWT_SECRET: ci-secret
      COOKIE_SECRET: ci-secret
      STORE_CORS: http://localhost:8000
      ADMIN_CORS: http://localhost:9000
      AUTH_CORS: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: medusa/package-lock.json
      - run: npm ci
      - run: npm run build
